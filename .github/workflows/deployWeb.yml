name: deployWeb.yml

on:
  push:
    branches: ["ghPage"]
    paths:
      - 'gh_pages/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: './gh_pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.1.0
